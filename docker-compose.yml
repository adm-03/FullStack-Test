services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env:ro
    command: /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir src
    
    env_file:
      - ./backend/.env.example
      - ./backend/.env
    restart: always
